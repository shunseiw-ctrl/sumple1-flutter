name: Deploy to Staging

on:
  push:
    branches: [main]

jobs:
  deploy-web:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.24.0'
          channel: 'stable'
          cache: true

      - name: Build web
        run: |
          flutter pub get
          flutter build web --release --dart-define=ENV=staging --dart-define=RECAPTCHA_SITE_KEY=${{ secrets.RECAPTCHA_SITE_KEY }}

      - name: Deploy to Firebase Hosting (staging)
        uses: w9jds/firebase-action@master
        with:
          args: deploy --only hosting --project alba-work-staging
        env:
          FIREBASE_TOKEN: '${{ secrets.FIREBASE_TOKEN }}'

  deploy-functions:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '18'
          cache: 'npm'
          cache-dependency-path: functions/package-lock.json

      - name: Install function dependencies
        run: cd functions && npm ci

      - name: Deploy Cloud Functions (staging)
        uses: w9jds/firebase-action@master
        with:
          args: deploy --only functions --project alba-work-staging
        env:
          FIREBASE_TOKEN: '${{ secrets.FIREBASE_TOKEN }}'
