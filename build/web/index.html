<!DOCTYPE html>
<html>
<head>
  <!--
    If you are serving your web app in a path other than the root, change the
    href value below to reflect the base path you are serving from.

    The path provided below has to start and end with a slash "/" in order for
    it to work correctly.

    For more details:
    * https://developer.mozilla.org/en-US/docs/Web/HTML/Element/base

    This is a placeholder for base href that will be replaced by the value of
    the `--base-href` argument provided to `flutter build`.
  -->
  <base href="/">

  <meta charset="UTF-8">
  <meta content="IE=Edge" http-equiv="X-UA-Compatible">
  <meta name="description" content="建設業界の仕事マッチングアプリ。職人と現場をつなぐ。">

  <!-- iOS meta tags & icons -->
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="ALBAWORK">
  <link rel="apple-touch-icon" href="icons/Icon-192.png">
  <meta name="theme-color" content="#1E50A2">

  <!-- Favicon -->
  <link rel="icon" type="image/png" href="favicon.png"/>

  <title>ALBAWORK</title>
  <link rel="manifest" href="manifest.json">
  <link rel="stylesheet" href="splash.css">
</head>
<body>
  <div id="splash" class="splash-container">
    <div class="splash-logo">
      <svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
        <path d="M13.783 2.003a1.003 1.003 0 0 0-.565.263L3.22 11.768a.75.75 0 0 0 .53 1.282h2.5v7.2a1.75 1.75 0 0 0 1.75 1.75h8a1.75 1.75 0 0 0 1.75-1.75v-7.2h2.5a.75.75 0 0 0 .53-1.282l-6.28-6.097V3.003a1 1 0 0 0-1-1h-.717Z"/>
      </svg>
    </div>
    <div class="splash-title">ALBAWORK</div>
    <div class="splash-subtitle">建設業界の仕事マッチングアプリ</div>
    <div class="splash-loader"></div>
  </div>

  <script>
    if ('serviceWorker' in navigator) {
      navigator.serviceWorker.getRegistrations().then(function(registrations) {
        for (var r of registrations) { r.unregister(); }
      });
    }
  </script>
  <script src="flutter_bootstrap.js" async></script>
  <script>
    function removeSplash() {
      var splash = document.getElementById('splash');
      if (splash && !splash.classList.contains('fade-out')) {
        splash.classList.add('fade-out');
        setTimeout(function() { splash.remove(); }, 600);
      }
    }

    window.addEventListener('flutter-first-frame', removeSplash);
    setTimeout(removeSplash, 10000);
  </script>
</body>
</html>
