    sdk: flutter

  flutter_lints: ^6.0.0

  # テスト基盤
  mocktail: ^1.0.4
  fake_cloud_firestore: ^4.0.1
  firebase_auth_mocks: ^0.15.1
  fake_async: ^1.3.2

  # ストアリリース準備
  flutter_launcher_icons: ^0.14.0
  flutter_native_splash: ^2.4.0


flutter:
