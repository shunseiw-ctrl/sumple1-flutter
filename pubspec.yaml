  flutter_riverpod: ^2.6.1
  go_router: ^14.8.1
  cached_network_image: ^3.4.1

  # Google Maps (Phase 15)
  google_maps_flutter: ^2.9.0
  connectivity_plus: ^6.0.0

  # 紹介コード (Phase 19)
  share_plus: ^10.0.0

  # Reactive streams (Phase 22)
  rxdart: ^0.28.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  integration_test:
    sdk: flutter

  flutter_lints: ^6.0.0

  # テスト基盤
  mocktail: ^1.0.4
  fake_cloud_firestore: ^3.1.0
  firebase_auth_mocks: ^0.14.1
  fake_async: ^1.3.2

  # ストアリリース準備
  flutter_launcher_icons: ^0.14.0
  flutter_native_splash: ^2.4.0


flutter:
