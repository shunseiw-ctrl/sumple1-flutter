dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter
  intl: ^0.20.2

  firebase_messaging: ^15.0.0
  firebase_crashlytics: ^4.3.2
  flutter_local_notifications: ^18.0.0

  cupertino_icons: ^1.0.8

  firebase_core: ^3.5.0
  cloud_firestore: ^5.4.0
  firebase_auth: ^5.7.0
  firebase_storage: ^12.3.0
  url_launcher: ^6.2.6
  web: ^1.1.0
  http: ^1.2.0
  
  # 画像関連
  image_picker: ^1.0.7
  image: ^4.1.7

  # UI改善
  google_fonts: ^6.2.1
  shared_preferences: ^2.3.4

  # プロダクション
  in_app_review: ^2.0.9
  package_info_plus: ^8.0.0

  # QR出退勤
  qr_flutter: ^4.1.0
